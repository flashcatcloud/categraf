name: Issue Auto-Reply

on:
  issues:
    types: [opened]

jobs:
  auto-reply:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Send Issue to AI Agent
        env:
          AGENT_URL: ${{ secrets.AGENT_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROXY_TOKEN: ${{ secrets.PROXY_TOKEN }}
        run: |
          # Truncate body to prevent token overflow (max 3000 chars)
          ISSUE_BODY=$(cat <<'HEREDOC'
          ${{ github.event.issue.body }}
          HEREDOC
          )
          ISSUE_BODY=$(echo "$ISSUE_BODY" | head -c 3000)

          # Build JSON payload with jq to handle special characters safely
          PAYLOAD=$(jq -n \
            --arg sender "${{ github.event.issue.user.login }}" \
            --arg room "${{ github.repository }}#${{ github.event.issue.number }}" \
            --arg content "[Issue #${{ github.event.issue.number }}] ${{ github.event.issue.title }}\n\n${ISSUE_BODY}" \
            --arg owner "${{ github.repository_owner }}" \
            --arg repo "${{ github.event.repository.name }}" \
            --arg issue_number "${{ github.event.issue.number }}" \
            --arg token "${GH_TOKEN}" \
            '{
              sender: $sender,
              room: $room,
              content: $content,
              reply_type: "github",
              reply_meta: {
                owner: $owner,
                repo: $repo,
                issue_number: $issue_number,
                token: $token
              }
            }')

          HTTP_STATUS=$(curl -s -o /tmp/agent_response.json -w "%{http_code}" \
            -X POST "$AGENT_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $PROXY_TOKEN" \
            -d "$PAYLOAD")

          RESPONSE=$(cat /tmp/agent_response.json)
          echo "Agent response (status=${HTTP_STATUS}): ${RESPONSE}"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Agent returned HTTP ${HTTP_STATUS}: ${RESPONSE}"
            exit 1
          fi
